name: Update Eden

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Get latest Eden commit
        id: get_commit
        run: |
          # Fetch latest master commit from Eden Gitea
          LATEST=$(curl -s "https://git.eden-emu.dev/api/v1/repos/eden-emu/eden/commits?limit=1" | jq -r '.[0].sha')
          echo "Latest commit: $LATEST"
          echo "commit=$LATEST" >> $GITHUB_OUTPUT

          # Get current commit from package.nix
          CURRENT=$(grep -oP 'rev = "\K[^"]+' package.nix | head -1)
          echo "Current commit: $CURRENT"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.get_commit.outputs.commit }}" = "${{ steps.get_commit.outputs.current }}" ]; then
            echo "No update needed"
            echo "update=false" >> $GITHUB_OUTPUT
          else
            echo "Update available!"
            echo "update=true" >> $GITHUB_OUTPUT
          fi

      - name: Fetch upstream version tag
        if: steps.check.outputs.update == 'true'
        id: version
        run: |
          # Get the latest release/tag to determine version prefix
          VERSION=$(curl -s "https://git.eden-emu.dev/api/v1/repos/eden-emu/eden/releases?limit=1" | jq -r '.[0].tag_name // empty' | sed 's/^v//')
          if [ -z "$VERSION" ]; then
            # Fallback: extract from current package.nix
            VERSION=$(grep -oP 'version = "\K[^-]+' package.nix | head -1)
          fi
          echo "Eden version prefix: $VERSION"
          echo "prefix=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.nix source
        if: steps.check.outputs.update == 'true'
        run: |
          NEW_COMMIT="${{ steps.get_commit.outputs.commit }}"
          VERSION_PREFIX="${{ steps.version.outputs.prefix }}"
          TODAY=$(date +%Y-%m-%d)

          # Update rev
          sed -i "s/rev = \"[^\"]*\";/rev = \"$NEW_COMMIT\";/" package.nix

          # Update version with date
          sed -i "s/version = \"[^\"]*\";/version = \"$VERSION_PREFIX-unstable-$TODAY\";/" package.nix

          # Update "Last updated" comment
          sed -i "s/# Last updated: .*/# Last updated: $TODAY/" package.nix

          echo "Updated source to commit: $NEW_COMMIT"

      - name: Get new source hash
        if: steps.check.outputs.update == 'true'
        run: |
          NEW_HASH=$(nix build --impure --expr '
            let
              pkgs = import <nixpkgs> {};
            in pkgs.fetchgit {
              url = "https://git.eden-emu.dev/eden-emu/eden.git";
              rev = "${{ steps.get_commit.outputs.commit }}";
              fetchSubmodules = true;
              hash = "sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=";
            }
          ' 2>&1 | grep -oP 'got:\s+\K\S+' || true)

          if [ -n "$NEW_HASH" ]; then
            echo "New source hash: $NEW_HASH"
            # Only update the source hash (first sha256 in fetchFromGitea block)
            sed -i "0,/hash = \"sha256-[^\"]*\";/{s|hash = \"sha256-[^\"]*\";|hash = \"$NEW_HASH\";|}" package.nix
          else
            echo "::error::Failed to get source hash"
            exit 1
          fi

      - name: Sync CPM dependencies
        if: steps.check.outputs.update == 'true'
        id: sync_deps
        run: |
          NEW_COMMIT="${{ steps.get_commit.outputs.commit }}"
          CURRENT_COMMIT="${{ steps.get_commit.outputs.current }}"

          # Fetch the upstream cpmfile.json for the new commit
          CPMFILE_URL="https://git.eden-emu.dev/eden-emu/eden/raw/commit/$NEW_COMMIT/externals/cpmfile.json"
          if ! curl -sf "$CPMFILE_URL" -o /tmp/cpmfile.json; then
            echo "::warning::Could not fetch upstream cpmfile.json — CPM deps not updated"
            echo "cpm_synced=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Fetched upstream cpmfile.json"

          # Run the sync script — updates deps/default.nix and package.nix
          SYNC_EXIT=0
          python3 scripts/sync-deps.py /tmp/cpmfile.json "$CURRENT_COMMIT" "$NEW_COMMIT" 2>&1 | tee /tmp/sync-output.txt || SYNC_EXIT=$?

          echo "cpm_synced=true" >> $GITHUB_OUTPUT

          if [ -f .sync-output.json ]; then
            # Extract counts for the summary
            UPDATED=$(jq -r '.updated | length' .sync-output.json)
            WARNINGS=$(jq -r '.warnings | length' .sync-output.json)
            NEW_DEPS=$(jq -r '.new_deps | length' .sync-output.json)
            ERRORS=$(jq -r '.errors | length' .sync-output.json)

            echo "updated=$UPDATED" >> $GITHUB_OUTPUT
            echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
            echo "new_deps=$NEW_DEPS" >> $GITHUB_OUTPUT
            echo "sync_errors=$ERRORS" >> $GITHUB_OUTPUT

            # Save warnings for issue body
            jq -r '.warnings[]' .sync-output.json > /tmp/dep-warnings.txt 2>/dev/null || true
            jq -r '.new_deps[]' .sync-output.json > /tmp/new-deps.txt 2>/dev/null || true
          fi

          # Exit 2 = new deps detected (non-fatal, build may still succeed)
          # Exit 1 = hash prefetch error (fatal)
          if [ "$SYNC_EXIT" -eq 1 ]; then
            echo "::error::Dependency sync failed — see output above"
            exit 1
          fi

      - name: Test build
        if: steps.check.outputs.update == 'true'
        id: build
        continue-on-error: true
        run: |
          nix build --show-trace 2>&1 | tee /tmp/build-output.txt | tail -100

      - name: Push update
        if: steps.check.outputs.update == 'true' && steps.build.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.nix deps/default.nix
          git commit -m "chore: update eden to $(echo ${{ steps.get_commit.outputs.commit }} | head -c 12)"
          git push

      - name: Open issue on failure
        if: steps.check.outputs.update == 'true' && steps.build.outcome == 'failure'
        run: |
          NEW_COMMIT="${{ steps.get_commit.outputs.commit }}"
          CURRENT_COMMIT="${{ steps.get_commit.outputs.current }}"

          # Build the issue body with diagnostic info
          BODY="Automated update to [\`${NEW_COMMIT:0:12}\`](https://git.eden-emu.dev/eden-emu/eden/commit/$NEW_COMMIT) failed to build."
          BODY="$BODY

          **Previous working commit:** \`$CURRENT_COMMIT\`"

          # Include dependency sync warnings if any
          if [ -f /tmp/dep-warnings.txt ] && [ -s /tmp/dep-warnings.txt ]; then
            BODY="$BODY

          ### Dependency Warnings
          \`\`\`
          $(cat /tmp/dep-warnings.txt)
          \`\`\`"
          fi

          # Include new deps if detected
          if [ -f /tmp/new-deps.txt ] && [ -s /tmp/new-deps.txt ]; then
            BODY="$BODY

          ### New CPM Dependencies Detected
          These were added upstream but are not in \`deps/default.nix\`:
          $(while read -r dep; do echo "- \`$dep\`"; done < /tmp/new-deps.txt)"
          fi

          # Include build error tail
          if [ -f /tmp/build-output.txt ]; then
            BODY="$BODY

          ### Build Output (last 50 lines)
          \`\`\`
          $(tail -50 /tmp/build-output.txt)
          \`\`\`"
          fi

          BODY="$BODY

          Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for full logs."

          # Check for existing open issue
          EXISTING=$(gh issue list --search "Eden update failed" --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Eden update failed — ${NEW_COMMIT:0:12}" \
              --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Warn about new deps (even on success)
        if: steps.check.outputs.update == 'true' && steps.build.outcome == 'success' && steps.sync_deps.outputs.new_deps != '0'
        run: |
          # If build succeeded but new deps were detected, create an informational issue
          NEW_COMMIT="${{ steps.get_commit.outputs.commit }}"

          BODY="Build succeeded for [\`${NEW_COMMIT:0:12}\`](https://git.eden-emu.dev/eden-emu/eden/commit/$NEW_COMMIT), but new CPM dependencies were detected upstream that are not yet tracked.

          These deps may be needed for future builds or specific features:

          $(while read -r dep; do echo "- \`$dep\`"; done < /tmp/new-deps.txt)

          ### Sync Script Output
          \`\`\`
          $(cat /tmp/sync-output.txt | tail -30)
          \`\`\`

          Review \`cpmfile.json\` and add the deps to \`deps/default.nix\` + \`package.nix\`, or add them to the \`SKIP_KEYS\` set in \`scripts/sync-deps.py\` if they're not needed."

          EXISTING=$(gh issue list --search "New CPM dependencies detected" --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "New CPM dependencies detected — review needed" \
              --body "$BODY" \
              --label "dependencies"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
